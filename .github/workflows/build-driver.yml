name: Build KMDF Driver
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install WDK
      run: |
        Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2196230" -OutFile "$env:TEMP\wdksetup.exe"
        Start-Process -Wait "$env:TEMP\wdksetup.exe" -ArgumentList "/q /norestart"

    - name: Build Driver
      run: |
        msbuild Rt5650SpbFilter.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload SYS
      uses: actions/upload-artifact@v4
      with:
        name: rt5650-driver
        path: Rt5650SpbFilter\x64\Release\Rt5650SpbFilter.sys
