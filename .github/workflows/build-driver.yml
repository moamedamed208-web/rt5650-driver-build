name: Build KMDF Driver
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install WDK
      run: |
        choco install windows-driver-kit-10 -y

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Driver
      run: |
        # Force the use of the installed WDK and SDK
        msbuild Rt5650SpbFilter.sln /p:Configuration=Release /p:Platform=x64 /p:TargetVersion="Windows10" /p:SignMode=Off /p:WDKBinRoot="C:\Program Files (x86)\Windows Kits\10\bin"

    - name: Prepare Artifacts
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "out"
        Copy-Item -Path "x64\Release\Rt5650SpbFilter\Rt5650SpbFilter.sys" -Destination "out\" -ErrorAction SilentlyContinue
        Copy-Item -Path "x64\Release\Rt5650SpbFilter\Rt5650SpbFilter.inf" -Destination "out\" -ErrorAction SilentlyContinue
        # If the path is different, try to find it
        if (-not (Test-Path "out\Rt5650SpbFilter.sys")) {
            Get-ChildItem -Recurse -Filter "Rt5650SpbFilter.sys" | Copy-Item -Destination "out\"
            Get-ChildItem -Recurse -Filter "Rt5650SpbFilter.inf" | Copy-Item -Destination "out\"
        }

    - name: Upload Driver
      uses: actions/upload-artifact@v4
      with:
        name: rt5650-driver
        path: out\

