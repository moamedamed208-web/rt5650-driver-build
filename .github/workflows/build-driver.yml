name: Build KMDF Driver
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install WDK
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2196230" -OutFile "$env:TEMP\wdksetup.exe"
        Start-Process -Wait "$env:TEMP\wdksetup.exe" -ArgumentList "/q /norestart"

    - name: Build Driver
      shell: pwsh
      run: |
        $wdkBase = "C:\Program Files (x86)\Windows Kits\10"
        $wdkVer = (Get-ChildItem "$wdkBase\Include" | Where-Object {$_.Name -like "10.*"} | Sort-Object Name -Descending | Select-Object -First 1).Name
        $vsBase = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC"
        $msvcVer = (Get-ChildItem $vsBase | Sort-Object Name -Descending | Select-Object -First 1).Name
        $cl = "$vsBase\$msvcVer\bin\HostX64\x64\cl.exe"
        $link = "$vsBase\$msvcVer\bin\HostX64\x64\link.exe"
        $kmInc = "$wdkBase\Include\$wdkVer\km"
        $sharedInc = "$wdkBase\Include\$wdkVer\shared"
        $kmLib = "$wdkBase\Lib\$wdkVer\km\x64"
        $wdfVer = (Get-ChildItem "$wdkBase\Include\wdf\kmdf" -ErrorAction SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1).Name
        $wdfInc = "$wdkBase\Include\wdf\kmdf\$wdfVer"
        $wdfLib = "$wdkBase\Lib\wdf\kmdf\x64\$wdfVer"
        New-Item -Force -ItemType Directory -Path "out"
        & $cl /nologo /c /Zi /O2 /GS /Zc:wchar_t /TC "/I$kmInc" "/I$sharedInc" "/I$wdfInc" /D_AMD64_ /DAMD64 /D_WIN64 /DNTDDI_VERSION=0x0A000000 /D_WIN32_WINNT=0x0A00 /Fo"out\Rt5650SpbFilter.obj" Rt5650SpbFilter.c
        if ($LASTEXITCODE -ne 0) { exit 1 }
        & $link /nologo /SUBSYSTEM:NATIVE /DRIVER /NODEFAULTLIB /ENTRY:DriverEntry "/OUT:out\Rt5650SpbFilter.sys" "/LIBPATH:$kmLib" "/LIBPATH:$wdfLib" ntoskrnl.lib hal.lib wdfldr.lib wdf01000.lib "out\Rt5650SpbFilter.obj"
        if ($LASTEXITCODE -ne 0) { exit 1 }

    - name: Upload Driver
      uses: actions/upload-artifact@v4
      with:
        name: rt5650-driver
        path: out\Rt5650SpbFilter.sys
